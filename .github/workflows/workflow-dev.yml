name: Deployment Dev

on: [push]

jobs:
  Lint:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check .

  Build:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    needs: Lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ghcr.io/algnot/amara-backend:dev-${{ github.sha }} .

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push ghcr.io/algnot/amara-backend:dev-${{ github.sha }}

      - name: Tag latest
        run: |
          docker tag ghcr.io/algnot/amara-backend:dev-${{ github.sha }} ghcr.io/algnot/amara-backend:dev
          docker push ghcr.io/algnot/amara-backend:dev
